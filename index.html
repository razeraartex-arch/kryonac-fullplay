<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KryonAC FullPlay - 3D Replay Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
#canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
canvas { display: block; }

#ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#ui-overlay > * { pointer-events: auto; }

#token-input {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #16213e; border: 2px solid #0f3460; border-radius: 12px;
    padding: 40px; text-align: center; width: 420px;
}
#token-input h1 { color: #00d6ff; font-size: 24px; margin-bottom: 8px; }
#token-input p { color: #888; font-size: 13px; margin-bottom: 20px; }
#token-input input {
    width: 100%; padding: 12px; border: 1px solid #0f3460; border-radius: 6px;
    background: #0a0e27; color: #fff; font-size: 16px; text-align: center;
    font-family: monospace; letter-spacing: 2px;
}
#token-input input:focus { outline: none; border-color: #00d6ff; }
#token-input button {
    margin-top: 12px; padding: 10px 30px; background: #0f3460; color: #00d6ff;
    border: 1px solid #00d6ff; border-radius: 6px; cursor: pointer; font-size: 14px;
}
#token-input button:hover { background: #00d6ff; color: #0a0e27; }

#controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    padding: 20px 30px 25px;
}
#timeline-container { width: 100%; margin-bottom: 10px; }
#timeline {
    width: 100%; height: 6px; -webkit-appearance: none; background: #0f3460;
    border-radius: 3px; outline: none; cursor: pointer;
}
#timeline::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; background: #00d6ff;
    border-radius: 50%; cursor: pointer;
}
#controls-row { display: flex; align-items: center; gap: 15px; }
#controls-row button {
    background: #0f3460; border: 1px solid #00d6ff; color: #00d6ff;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
}
#controls-row button:hover { background: #00d6ff; color: #0a0e27; }
#controls-row button.active { background: #00d6ff; color: #0a0e27; }
#time-label { color: #888; font-size: 12px; font-family: monospace; min-width: 100px; }
#player-label { color: #00d6ff; font-size: 14px; font-weight: bold; }
#speed-label { color: #888; font-size: 12px; }

#info-panel {
    position: absolute; top: 15px; right: 15px;
    background: rgba(22, 33, 62, 0.9); border: 1px solid #0f3460;
    border-radius: 8px; padding: 15px; width: 300px; font-size: 12px;
    max-height: 80vh; overflow-y: auto;
}
#info-panel h3 { color: #00d6ff; margin-bottom: 8px; font-size: 14px; }
.info-row { display: flex; justify-content: space-between; margin: 3px 0; }
.info-label { color: #888; }
.info-value { color: #e0e0e0; font-family: monospace; }

#chat-panel {
    position: absolute; bottom: 110px; left: 15px;
    background: rgba(22, 33, 62, 0.85); border: 1px solid #0f3460;
    border-radius: 8px; padding: 10px; width: 350px; max-height: 200px;
    overflow-y: auto; font-size: 12px;
}
.chat-msg { margin: 2px 0; }
.chat-player { color: #00d6ff; font-weight: bold; }
.chat-text { color: #ccc; }

#players-list {
    position: absolute; top: 15px; left: 15px;
    background: rgba(22, 33, 62, 0.9); border: 1px solid #0f3460;
    border-radius: 8px; padding: 15px; width: 220px; font-size: 12px;
}
#players-list h3 { color: #00d6ff; margin-bottom: 8px; font-size: 14px; }
.player-entry { padding: 4px 0; cursor: pointer; border-radius: 4px; padding: 4px 6px; }
.player-entry:hover { background: rgba(0,214,255,0.1); }
.player-entry.selected { background: rgba(0,214,255,0.2); border-left: 3px solid #00d6ff; }
.player-name { color: #e0e0e0; font-weight: bold; }
.player-hp { color: #ff4444; }
.player-pos { color: #888; font-family: monospace; font-size: 11px; }

#loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #00d6ff; font-size: 18px; display: none;
}
</style>
</head>

        <div class="info-row"><span class="info-label">World</span><span class="info-value" id="info-world">-</span></div>

        <div class="info-row"><span class="info-label">Position</span><span class="info-value" id="info-pos">-</span></div>
        <div class="info-row"><span class="info-label">Velocity</span><span class="info-value" id="info-vel">-</span></div>
        <div class="info-row"><span class="info-label">Yaw / Pitch</span><span class="info-value" id="info-look">-</span></div>
        <div class="info-row"><span class="info-label">Health</span><span class="info-value" id="info-hp">-</span></div>
        <div class="info-row"><span class="info-label">Food / Sat</span><span class="info-value" id="info-food">-</span></div>
        <div class="info-row"><span class="info-label">Ground</span><span class="info-value" id="info-ground">-</span></div>
        <div class="info-row"><span class="info-label">Gamemode</span><span class="info-value" id="info-gm">-</span></div>

        <div class="info-row"><span class="info-label">Armor</span><span class="info-value" id="info-armor">-</span></div>
        <div class="info-row"><span class="info-label">Effects</span><span class="info-value" id="info-effects">-</span></div>
    </div>

    <div id="chat-panel" style="display:none"></div>

    <div id="controls" style="display:none">
        <div id="timeline-container">

        </div>
        <div id="controls-row">
            <button onclick="skipBack()" title="Back 5s">⏮</button>
            <button id="play-btn" onclick="togglePlay()" title="Play/Pause">▶</button>
            <button onclick="skipForward()" title="Forward 5s">⏭</button>
            <span id="time-label">0:00 / 0:00</span>
            <span id="player-label">-</span>
            <span style="flex:1"></span>
            <button onclick="changeSpeed(-1)">-</button>
            <span id="speed-label">1.0x</span>
            <button onclick="changeSpeed(1)">+</button>
            <button id="follow-btn" onclick="toggleFollow()" class="active">Follow</button>
            <button onclick="resetCamera()">Reset View</button>
            <button id="names-btn" onclick="toggleNames()" class="active">Names</button>
            <button id="blocks-btn" onclick="toggleBlockChanges()" class="active">Blocks</button>
            <button id="trail-btn" onclick="toggleTrail()" class="active">Trail</button>
        </div>
    </div>

// Cache for per-dimension head geometries
function getHeadGeo(h) {
    var key = h || 64;
    if (headGeos[key]) return headGeos[key];
    var hs = 0.25;
    var faceData = [
        {p:[[ hs, hs,-hs],[ hs, hs, hs],[ hs,-hs,-hs],[ hs,-hs, hs]],u:0,uv:8,w:8,h:8},
        {p:[[-hs, hs, hs],[-hs, hs,-hs],[-hs,-hs, hs],[-hs,-hs,-hs]],u:16,uv:8,w:8,h:8},
        {p:[[-hs, hs,-hs],[ hs, hs,-hs],[-hs, hs, hs],[ hs, hs, hs]],u:8,uv:0,w:8,h:8},
        {p:[[-hs,-hs, hs],[ hs,-hs, hs],[-hs,-hs,-hs],[ hs,-hs,-hs]],u:16,uv:0,w:8,h:8},
        {p:[[-hs, hs, hs],[ hs, hs, hs],[-hs,-hs, hs],[ hs,-hs, hs]],u:8,uv:8,w:8,h:8},
        {p:[[ hs, hs,-hs],[-hs, hs,-hs],[ hs,-hs,-hs],[-hs,-hs,-hs]],u:24,uv:8,w:8,h:8}
    ];
    var pos = [], uvs = [], idx = [];
    var o = 0;
    for (var f = 0; f < 6; f++) {
        var face = faceData[f];
        var umin = face.u / 64, umax = (face.u + face.w) / 64;
        var vmin = face.uv / key, vmax = (face.uv + face.h) / key;
        for (var vi = 0; vi < 4; vi++) {
            pos.push(face.p[vi][0], face.p[vi][1], face.p[vi][2]);
            uvs.push(vi === 0 || vi === 2 ? umin : umax, vi < 2 ? vmin : vmax);
        }
        idx.push(o, o+1, o+2, o+1, o+3, o+2);
        o += 4;
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    headGeos[key] = geo;
    return geo;
}

    if (id === 0) return 0x000000;
    if (BLOCK_COLORS[id]) return BLOCK_COLORS[id];
    var h = (id * 2654435761) & 0xFFFFFF;
    return h | 0x404040;

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.FogExp2(0x1a1a2e, 0.002);

    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    ambientLight = new THREE.AmbientLight(0x606080, 1.2);
    scene.add(ambientLight);
    dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(100, 200, 100);
    scene.add(dirLight);

    clock = new THREE.Clock();
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxDistance = 300;

    window.addEventListener('resize', onResize);
    animate();
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    animationId = requestAnimationFrame(animate);
    if (controls) controls.update();

    if (isPlaying && replayData) {
        const delta = clock.getDelta() * playSpeed;
        const frameDuration = 1 / 20;
        const frameIncrement = Math.max(1, Math.round(delta / frameDuration));
        const newFrame = currentFrame + frameIncrement;

        if (newFrame >= replayData.frames.length) {
            currentFrame = 0;
        } else {
            currentFrame = newFrame;
        }
        updateTimeline();
        renderFrame(currentFrame);
    }

    renderer.render(scene, camera);
    updateBlockHover();
}

function getTokenFromHash() {
    const hash = window.location.hash;
    if (!hash || hash.length < 2) return null;
    let token = hash.substring(1);
    if (token.startsWith('!')) token = token.substring(1);
    token = token.split('/')[0].split('?')[0].trim();
    return token.length > 0 ? token : null;
}

async function loadReplay() {
    const token = document.getElementById('token-field').value.trim();
    if (!token) {
        document.getElementById('token-error').textContent = 'Enter a token';
        return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('token-error').textContent = '';

    try {
        const resp = await fetch(FIREBASE_URL + '/replays/' + encodeURIComponent(token) + '.json');
        if (!resp.ok) {
            throw new Error('Recording not found (HTTP ' + resp.status + ')');
        }
        const data = await resp.json();
        if (!data) {
            throw new Error('Recording not found or expired');
        }

        replayData = data;
        console.log('[FullPlay] Data loaded:', {
            playerName: data.playerName,
            chunks: data.chunks ? data.chunks.length : 0,
            frames: data.frames ? data.frames.length : 0,
            blockChanges: data.blockChanges ? data.blockChanges.length : 0,
            firstChunk: data.chunks && data.chunks[0] ? {
                cx: data.chunks[0].cx,
                cz: data.chunks[0].cz,
                yOff: data.chunks[0].yOff,
                yRange: data.chunks[0].yRange,
                blocksType: data.chunks[0].blocks ? typeof data.chunks[0].blocks[0] : 'none',
                blocksLength: data.chunks[0].blocks ? data.chunks[0].blocks.length : 0,
                firstBlock: data.chunks[0].blocks ? data.chunks[0].blocks[0] : 'none'
            } : 'no chunks'
        });
        onReplayLoaded();
    } catch (e) {
        document.getElementById('token-error').textContent = e.message;
        document.getElementById('loading').style.display = 'none';
    }
}

function onReplayLoaded() {
    document.getElementById('token-input').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('controls').style.display = '';
    document.getElementById('info-panel').style.display = '';
    document.getElementById('players-list').style.display = '';
    document.getElementById('chat-panel').style.display = '';

    let debugInfo = 'Chunks: ' + (replayData.chunks ? replayData.chunks.length : 0);
    if (replayData.chunks && replayData.chunks.length > 0) {
        const c = replayData.chunks[0];
        debugInfo += ' | yRange: ' + (c.yRange || 'MISSING') + ' | blocks: ' + (c.blocks ? c.blocks.length : 0);
        if (c.blocks && c.blocks.length > 0) {
            debugInfo += ' | type: ' + typeof c.blocks[0] + ' | sample: ' + JSON.stringify(c.blocks[0]);
        }
    }
    console.log('[FullPlay] ' + debugInfo);

    primaryPlayer = replayData.playerUuid;
    selectedPlayer = primaryPlayer;
    currentWorld = null;

    document.getElementById('player-label').textContent = replayData.playerName + ' — ' + replayData.triggerCheck;

    const totalSeconds = Math.floor((replayData.frames.length) / 20);
    document.getElementById('timeline').max = replayData.frames.length - 1;

    buildBlockMeshes();
    loadAllSkins();
    updatePlayersList();
    renderFrame(0);
}

function buildBlockMeshes() {
    blockMeshes.forEach(m => scene.remove(m));
    blockMeshes = [];

    if (!replayData.chunks || replayData.chunks.length === 0) return;

    const blockList = [];

    for (const chunk of replayData.chunks) {
        if (currentWorld && chunk.wn && chunk.wn !== currentWorld) continue;
        const cx = chunk.cx;
        const cz = chunk.cz;
        const yOff = chunk.yOff || 0;
        const yr = chunk.yRange || 384;
        const blocks = chunk.blocks;

        if (!Array.isArray(blocks)) continue;

        if (blocks.length === 16 * yr * 16) {
            for (let i = 0; i < blocks.length; i++) {
                const id = blocks[i];
                if (id === 0) continue;
                const x = (i / (yr * 16)) | 0;
                const rem = i % (yr * 16);
                const y = ((rem / 16) | 0) + yOff;
                const z = rem % 16;
                const color = getBlockColor(id);
                blockList.push({ wx: cx * 16 + x, wy: y, wz: cz * 16 + z, color: color });
            }
        } else if (blocks.length > 0 && typeof blocks[0] === 'number') {
            for (let i = 0; i < blocks.length; i++) {
                const id = blocks[i];
                if (id === 0) continue;
                const x = (i / (yr * 16)) | 0;
                const rem = i % (yr * 16);
                const y = ((rem / 16) | 0) + yOff;
                const z = rem % 16;
                const color = getBlockColor(id);
                blockList.push({ wx: cx * 16 + x, wy: y, wz: cz * 16 + z, color: color });
            }
        } else {
            for (let i = 0; i < blocks.length; i++) {
                const entry = blocks[i];
                if (typeof entry === 'string') {
                    const parts = entry.split(':');
                    if (parts.length === 2) {
                        const idx = parseInt(parts[0]);
                        const id = parseInt(parts[1]);
                        if (id === 0) continue;
                        const x = (idx / (yr * 16)) | 0;
                        const rem = idx % (yr * 16);
                        const y = ((rem / 16) | 0) + yOff;
                        const z = rem % 16;
                        const color = getBlockColor(id);
                        blockList.push({ wx: cx * 16 + x, wy: y, wz: cz * 16 + z, color: color });
                    }
                }
            }
        }
    }

    const colorCounts = {};
    for (const b of blockList) {
        const key = b.color.toString();
        colorCounts[key] = (colorCounts[key] || 0) + 1;
    }

    const geometries = {};
    const dummy = new THREE.Object3D();
    for (const b of blockList) {
        const colorKey = b.color.toString();
        if (!geometries[colorKey]) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshLambertMaterial({ color: b.color });
            geometries[colorKey] = new THREE.InstancedMesh(geo, mat, Math.max(colorCounts[colorKey], 1));
            geometries[colorKey]._count = 0;
        }
        const mesh = geometries[colorKey];
        dummy.position.set(b.wx, b.wy, b.wz);
        dummy.updateMatrix();
        mesh.setMatrixAt(mesh._count, dummy.matrix);
        mesh._count++;
        mesh.count = mesh._count;
        mesh.instanceMatrix.needsUpdate = true;
    }

    for (const mesh of Object.values(geometries)) {
        scene.add(mesh);
        blockMeshes.push(mesh);
    }
    console.log('[FullPlay] Built ' + blockList.length + ' blocks in ' + Object.keys(geometries).length + ' color groups');
}

function updatePlayersList() {
    const container = document.getElementById('players-container');
    container.innerHTML = '';
    if (!replayData || !replayData.frames.length) return;

    const firstFrame = replayData.frames[0];
    const uuids = Object.keys(firstFrame.players);
    const colorIdx = {};

    uuids.forEach((uuid, i) => {
        const p = firstFrame.players[uuid];
        const div = document.createElement('div');
        div.className = 'player-entry' + (uuid === selectedPlayer ? ' selected' : '');
        div.style.borderLeft = '3px solid #' + PLAYER_COLORS[i % PLAYER_COLORS.length].toString(16).padStart(6, '0');
        div.innerHTML = '<div class="player-name">' + esc(p.name) + '</div><div class="player-pos">X:' + p.x.toFixed(1) + ' Y:' + p.y.toFixed(1) + ' Z:' + p.z.toFixed(1) + '</div>';
        div.onclick = function() { selectedPlayer = uuid; updatePlayersList(); };
        container.appendChild(div);
        colorIdx[uuid] = i;
    });
}

function renderFrame(frameIdx) {
    if (!replayData || frameIdx >= replayData.frames.length) return;

    const frame = replayData.frames[frameIdx];
    const tick = frame.tick;
    updateSky(frame.wt);

    const frameWorld = frame.wn || null;
    if (frameWorld && frameWorld !== currentWorld) {
        currentWorld = frameWorld;
        buildBlockMeshes();
    }

    while (Object.keys(playerMeshes).length > 0) {
        const key = Object.keys(playerMeshes)[0];
        scene.remove(playerMeshes[key]);
        delete playerMeshes[key];
    }
    for (let pi = 0; pi < projectileMeshes.length; pi++) {
        scene.remove(projectileMeshes[pi]);
    }
    projectileMeshes = [];
    for (let bi = 0; bi < blockChangeMeshes.length; bi++) {
        scene.remove(blockChangeMeshes[bi]);
    }
    blockChangeMeshes = [];
    for (let ti = 0; ti < trailMeshes.length; ti++) {
        scene.remove(trailMeshes[ti]);
    }
    trailMeshes = [];
    for (let gi = 0; gi < gridMeshes.length; gi++) {
        scene.remove(gridMeshes[gi]);
    }
    gridMeshes = [];

    const uuids = Object.keys(frame.players);
    uuids.forEach(function(uuid, i) {
        const p = frame.players[uuid];
        const color = PLAYER_COLORS[i % PLAYER_COLORS.length];

        const group = new THREE.Group();
        group.position.set(p.x, p.y, p.z);

        const skinTex = skinTextures[uuid];
        const skinMat = skinTex
            ? new THREE.MeshLambertMaterial({ map: skinTex })
            : new THREE.MeshLambertMaterial({ color: color });

        const yawRad = THREE.MathUtils.degToRad(p.yaw || 0);
        const pitchRad = THREE.MathUtils.degToRad(p.pitch || 0);

        const bodyGroup = new THREE.Group();

        const bodyGeo = new THREE.BoxGeometry(0.6, 0.75, 0.3);
        const body = new THREE.Mesh(bodyGeo, skinMat.clone());
        body.position.y = 0.375;
        bodyGroup.add(body);

        var dim = skinDimensions[uuid];
        var headH = (dim && dim.h) || 64;
        var headGeo = getHeadGeo(headH);
        var head = new THREE.Mesh(headGeo, skinMat.clone());
        head.position.set(0, 0.9, 0);
        head.rotation.x = pitchRad;
        bodyGroup.add(head);

        var _speed = Math.sqrt(p.vx * p.vx + p.vz * p.vz);
        var _swing = Math.sin(frame.tick * Math.min(_speed * 3, 6)) * Math.min(_speed * 2, 0.5);

        var _mkLimb = function(box, px, py, oy, swing, axis) {
            var g = new THREE.Group();
            g.position.set(px, py, 0);
            var m = new THREE.Mesh(box, skinMat.clone());
            m.position.set(0, oy, 0);
            g.add(m);
            g.rotation[axis] = swing;
            bodyGroup.add(g);
            return g;
        };

        _mkLimb(new THREE.BoxGeometry(0.2, 0.75, 0.2), -0.45, 0.75, -0.375, _swing, 'x');
        _mkLimb(new THREE.BoxGeometry(0.2, 0.75, 0.2), 0.45, 0.75, -0.375, -_swing, 'x');
        _mkLimb(new THREE.BoxGeometry(0.2, 0.75, 0.2), -0.15, 0, -0.375, -_swing, 'x');
        _mkLimb(new THREE.BoxGeometry(0.2, 0.75, 0.2), 0.15, 0, -0.375, _swing, 'x');

        bodyGroup.rotation.y = -yawRad;

        var dirEnd = new THREE.Vector3(0, 0.6, -2);
        dirEnd.applyEuler(new THREE.Euler(pitchRad, 0, 0));
        dirEnd.applyEuler(new THREE.Euler(0, -yawRad, 0));
        var lineGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0.6, 0), dirEnd
        ]);
        var lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        var dirLine = new THREE.Line(lineGeo, lineMat);
        bodyGroup.add(dirLine);

        if (p.armor) {
            var armorColors = {
                'LEATHER_BOOTS':0x8B4513,'LEATHER_LEGGINGS':0x8B4513,'LEATHER_CHESTPLATE':0x8B4513,'LEATHER_HELMET':0x8B4513,
                'CHAINMAIL_BOOTS':0xC0C0C0,'CHAINMAIL_LEGGINGS':0xC0C0C0,'CHAINMAIL_CHESTPLATE':0xC0C0C0,'CHAINMAIL_HELMET':0xC0C0C0,
                'IRON_BOOTS':0xDDDDDD,'IRON_LEGGINGS':0xDDDDDD,'IRON_CHESTPLATE':0xDDDDDD,'IRON_HELMET':0xDDDDDD,
                'GOLD_BOOTS':0xFFD700,'GOLD_LEGGINGS':0xFFD700,'GOLD_CHESTPLATE':0xFFD700,'GOLD_HELMET':0xFFD700,
                'DIAMOND_BOOTS':0x33E0FF,'DIAMOND_LEGGINGS':0x33E0FF,'DIAMOND_CHESTPLATE':0x33E0FF,'DIAMOND_HELMET':0x33E0FF
            };
            var armorOrder = [
                { piece: 'BOOTS', box: new THREE.BoxGeometry(0.28, 0.06, 0.12), y: -0.72 },
                { piece: 'LEGGINGS', box: new THREE.BoxGeometry(0.28, 0.35, 0.14), y: -0.18 },
                { piece: 'CHESTPLATE', box: new THREE.BoxGeometry(0.34, 0.3, 0.16), y: 0.35 },
                { piece: 'HELMET', box: new THREE.BoxGeometry(0.54, 0.08, 0.54), y: 1.12 }
            ];
            for (var ai = 0; ai < 4 && ai < p.armor.length; ai++) {
                var pieceName = p.armor[ai];
                if (!pieceName) continue;
                var ao = armorOrder[ai];
                var ac = armorColors[pieceName];
                if (ac) {
                    var armorMat = new THREE.MeshLambertMaterial({ color: ac, transparent: true, opacity: 0.35 });
                    var armorMesh = new THREE.Mesh(ao.box, armorMat);
                    armorMesh.position.set(0, ao.y, 0);
                    bodyGroup.add(armorMesh);
                }
            }
        }

        if (p.held && p.held !== 'AIR') {
            var itemColor = ITEM_COLORS[p.held] || 0x888888;
            var heldGeo = new THREE.BoxGeometry(0.12, 0.35, 0.12);
            var heldMat = new THREE.MeshLambertMaterial({ color: itemColor });
            var heldMesh = new THREE.Mesh(heldGeo, heldMat);
            heldMesh.position.set(0.55, 0.1, -0.15);
            heldMesh.rotation.x = -0.5;
            bodyGroup.add(heldMesh);
        }

        group.add(bodyGroup);

        if (showNames) {
            var nameCanvas = document.createElement('canvas');
        nameCanvas.width = 256;
        nameCanvas.height = 64;
        var ctx = nameCanvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.beginPath();
        ctx.moveTo(16, 8);
        ctx.lineTo(240, 8);
        ctx.quadraticCurveTo(252, 8, 252, 20);
        ctx.lineTo(252, 44);
        ctx.quadraticCurveTo(252, 56, 240, 56);
        ctx.lineTo(16, 56);
        ctx.quadraticCurveTo(4, 56, 4, 44);
        ctx.lineTo(4, 20);
        ctx.quadraticCurveTo(4, 8, 16, 8);
        ctx.closePath();
        ctx.fill();
        ctx.font = 'Bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = uuid === selectedPlayer ? '#00d6ff' : '#ffffff';
        ctx.fillText(p.name, 128, 34);
        var nameTex = new THREE.CanvasTexture(nameCanvas);
        nameTex.minFilter = THREE.LinearFilter;
        var nameMat = new THREE.SpriteMaterial({ map: nameTex, transparent: true, depthWrite: false, depthTest: false });
        var nameSprite = new THREE.Sprite(nameMat);
        nameSprite.scale.set(1.6, 0.4, 1);
        nameSprite.position.set(0, 1.35, 0);
        group.add(nameSprite);
        }

        if (p.hp !== undefined) {
            var hpW = uuid === selectedPlayer ? 0.6 : 0.4;
            var hpR = p.hp / 20;
            var hBg = new THREE.Mesh(
                new THREE.PlaneGeometry(hpW, 0.05),
                new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide })
            );
            hBg.position.set(0, uuid === selectedPlayer ? 1.5 : 1.2, 0);
            group.add(hBg);
            var hFg = new THREE.Mesh(
                new THREE.PlaneGeometry(hpW * hpR, 0.05),
                new THREE.MeshBasicMaterial({ color: hpR > 0.5 ? 0x44ff44 : hpR > 0.25 ? 0xffff44 : 0xff4444, side: THREE.DoubleSide })
            );
            hFg.position.set(-(hpW * (1 - hpR)) / 2, uuid === selectedPlayer ? 1.5 : 1.2, 0);
            group.add(hFg);
        }

        scene.add(group);
        playerMeshes[uuid] = group;
    });

    if (replayData.projectiles && replayData.projectiles.length > 0) {
        const bulletGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const projColors = { 'Arrow':0xffaa00, 'Snowball':0xffffff, 'Egg':0xeedd99, 'EnderPearl':0x33ff66, 'Fireball':0xff4400, 'Trident':0x33aaff };
        const frameTick = frame.tick;
        for (const proj of replayData.projectiles) {
            if (proj.t === frameTick) {
                const pc = projColors[proj.type] || 0xff00ff;
                const pMat = new THREE.MeshLambertMaterial({ color: pc, emissive: pc, emissiveIntensity: 0.3 });
                const pMesh = new THREE.Mesh(bulletGeo, pMat);
                pMesh.position.set(proj.x, proj.y, proj.z);
                scene.add(pMesh);
                if (!projectileMeshes) projectileMeshes = [];
                projectileMeshes.push(pMesh);
            }
        }
    }

    if (showBlockChanges && replayData.blockChanges && replayData.blockChanges.length > 0) {
        var bcTick = frame.tick;
        for (var bcIdx = 0; bcIdx < replayData.blockChanges.length; bcIdx++) {
            var bc = replayData.blockChanges[bcIdx];
            if (bc.t === bcTick) {
                var bcColor = getBlockColor(bc.m);
                var bcGeo = new THREE.BoxGeometry(1.05, 1.05, 1.05);
                var bcMat = new THREE.MeshLambertMaterial({ color: bcColor, transparent: true, opacity: 0.6, emissive: bcColor, emissiveIntensity: 0.5 });
                var bcMesh = new THREE.Mesh(bcGeo, bcMat);
                bcMesh.position.set(bc.x + 0.5, bc.y + 0.5, bc.z + 0.5);
                scene.add(bcMesh);
                blockChangeMeshes.push(bcMesh);
            }
        }
    }

    if (showTrail) {
        for (var tuuid in frame.players) {
            if (!trailData[tuuid]) trailData[tuuid] = [];
            var tp = frame.players[tuuid];
            var trailArr = trailData[tuuid];
            trailArr.push({ x: tp.x, y: tp.y + 0.1, z: tp.z });
            while (trailArr.length > 200) trailArr.shift();
            if (trailArr.length > 2) {
                var linePoints = [];
                for (var tli = 0; tli < trailArr.length; tli++) {
                    linePoints.push(new THREE.Vector3(trailArr[tli].x, trailArr[tli].y, trailArr[tli].z));
                }
                var lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
                var trailColor = tuuid === selectedPlayer ? 0x00d6ff : 0x888888;
                var lineMat = new THREE.LineBasicMaterial({ color: trailColor, transparent: true, opacity: 0.3 });
                var line = new THREE.Line(lineGeo, lineMat);
                scene.add(line);
                trailMeshes.push(line);
            }
        }
    }

    if (followTarget && playerMeshes[selectedPlayer]) {
        const pos = playerMeshes[selectedPlayer].position;
        camera.position.set(pos.x + 5, pos.y + 3, pos.z + 5);
        controls.target.copy(pos);
        controls.update();
    }

    if (frame.chat && frame.chat.length > 0) {
        const chatPanel = document.getElementById('chat-panel');
        frame.chat.forEach(function(c) {
            chatPanel.innerHTML += '<div class="chat-msg"><span class="chat-player">' + esc(c.p) + ': </span><span class="chat-text">' + esc(c.m) + '</span></div>';
        });
        chatPanel.scrollTop = chatPanel.scrollHeight;
    }

    updateInfoPanel(frame);
    updatePlayersListPosition(frame);
}

function updateInfoPanel(frame) {
    if (!selectedPlayer || !frame.players[selectedPlayer]) return;
    const p = frame.players[selectedPlayer];

    document.getElementById('info-title').textContent = p.name;
    document.getElementById('info-world').textContent = frame.wn || 'unknown';
    var wt = frame.wt;
    if (wt !== undefined) {
        var mcTime = ((wt % 24000) + 24000) % 24000;
        var hours = Math.floor(mcTime / 1000) + 6;
        var mins = Math.floor((mcTime % 1000) / 1000 * 60);
        var period = hours >= 12 ? 'PM' : 'AM';
        if (hours > 12) hours -= 12;
        if (hours === 0) hours = 12;
        var phase = mcTime < 12000 ? 'Day' : mcTime < 13000 ? 'Sunset' : mcTime < 23000 ? 'Night' : 'Sunrise';
        document.getElementById('info-mctime').textContent = hours + ':' + mins.toString().padStart(2,'0') + ' ' + period + ' (' + phase + ')';
    } else {
        document.getElementById('info-mctime').textContent = 'unknown';
    }
    document.getElementById('info-pos').textContent = p.x.toFixed(2) + ', ' + p.y.toFixed(2) + ', ' + p.z.toFixed(2);
    document.getElementById('info-vel').textContent = p.vx.toFixed(3) + ', ' + p.vy.toFixed(3) + ', ' + p.vz.toFixed(3);
    document.getElementById('info-look').textContent = (p.yaw|0) + '\u00b0 / ' + (p.pitch|0) + '\u00b0';
    document.getElementById('info-hp').textContent = p.hp.toFixed(1) + ' / 20';
    document.getElementById('info-food').textContent = p.food + ' / 20' + (p.sat !== undefined ? ' (' + p.sat.toFixed(1) + ' sat)' : '');
    document.getElementById('info-ground').textContent = p.g ? 'Yes' : 'No';
    document.getElementById('info-gm').textContent = GAMEMODE_NAMES[p.gm] || 'Unknown';
    document.getElementById('info-held').textContent = p.held || 'AIR';
    document.getElementById('info-speed').textContent = Math.sqrt(p.vx*p.vx + p.vy*p.vy + p.vz*p.vz).toFixed(3) + ' m/s';

    var armorStr = '';
    if (p.armor) {
        var armorLabels = ['Boots', 'Legs', 'Chest', 'Head'];
        for (var ai = 0; ai < 4 && ai < p.armor.length; ai++) {
            if (ai > 0) armorStr += ', ';
            var piece = p.armor[ai];
            armorStr += armorLabels[ai] + ': ' + (piece ? formatItemName(piece) : 'none');
        }
    } else {
        armorStr = 'no data';
    }
    document.getElementById('info-armor').textContent = armorStr;

    document.getElementById('info-effects').textContent = (p.effects || []).join(', ') || 'None';
}

function formatItemName(name) {
    if (!name || name === 'AIR') return 'none';
    var parts = name.split('_');
    var formatted = parts.map(function(w) {
        return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    }).join(' ');
    return formatted;
}

function updatePlayersListPosition(frame) {
    const entries = document.querySelectorAll('#players-container .player-entry');
    const uuids = Object.keys(frame.players);
    entries.forEach(function(entry, i) {
        if (i < uuids.length) {
            const p = frame.players[uuids[i]];
            const posEl = entry.querySelector('.player-pos');
            if (posEl) posEl.textContent = 'X:' + p.x.toFixed(1) + ' Y:' + p.y.toFixed(1) + ' Z:' + p.z.toFixed(1);
        }
    });
}

function updateTimeline() {
    if (!replayData) return;
    const el = document.getElementById('timeline');
    el.value = currentFrame;

    const totalSeconds = replayData.frames.length / 20;
    const currentSeconds = currentFrame / 20;

    const curMin = Math.floor(currentSeconds / 60);
    const curSec = Math.floor(currentSeconds % 60);
    const totMin = Math.floor(totalSeconds / 60);
    const totSec = Math.floor(totalSeconds % 60);

    document.getElementById('time-label').textContent =
        curMin + ':' + curSec.toString().padStart(2, '0') + ' / ' + totMin + ':' + totSec.toString().padStart(2, '0');
}

function togglePlay() {
    isPlaying = !isPlaying;
    document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
    if (isPlaying) clock.getDelta();
}

function skipBack() {
    if (!replayData) return;
    currentFrame = Math.max(0, currentFrame - 100);
    updateTimeline();
    renderFrame(currentFrame);
}

function skipForward() {
    if (!replayData) return;
    currentFrame = Math.min(replayData.frames.length - 1, currentFrame + 100);
    updateTimeline();
    renderFrame(currentFrame);
}

function changeSpeed(dir) {
    var speeds = [0.25, 0.5, 1.0, 2.0, 4.0, 8.0];
    var idx = speeds.indexOf(playSpeed);
    if (idx === -1) idx = 2;
    idx = Math.max(0, Math.min(speeds.length - 1, idx + dir));
    playSpeed = speeds[idx];
    document.getElementById('speed-label').textContent = playSpeed + 'x';
}

function toggleFollow() {
    followTarget = !followTarget;
    document.getElementById('follow-btn').classList.toggle('active', followTarget);
}

function resetCamera() {
    if (playerMeshes[selectedPlayer]) {
        const pos = playerMeshes[selectedPlayer].position;
        camera.position.set(pos.x + 10, pos.y + 5, pos.z + 10);
        controls.target.copy(pos);
        controls.update();
    }
}

function toggleNames() {
    showNames = !showNames;
    document.getElementById('names-btn').classList.toggle('active', showNames);
}

function toggleBlockChanges() {
    showBlockChanges = !showBlockChanges;
    document.getElementById('blocks-btn').classList.toggle('active', showBlockChanges);
}
function toggleTrail() {
    showTrail = !showTrail;
    document.getElementById('trail-btn').classList.toggle('active', showTrail);
}

function updateSky(worldTime) {
    if (worldTime === undefined) return;
    const t = ((worldTime % 24000) + 24000) % 24000 / 24000;
    const angle = t * Math.PI * 2;
    const sunHeight = Math.sin(angle);

    dirLight.position.set(Math.cos(angle) * 200, sunHeight * 200, 0);
    dirLight.intensity = Math.max(0.05, sunHeight * 0.4 + 0.4);

    const day = new THREE.Color(0x87CEEB);
    const dusk = new THREE.Color(0xCC5500);
    const night = new THREE.Color(0x050510);

    let skyColor;
    if (t < 0.03) {
        const p = t / 0.03;
        skyColor = night.clone().lerp(dusk, p);
    } else if (t < 0.05) {
        const p = (t - 0.03) / 0.02;
        skyColor = dusk.clone().lerp(day, p);
    } else if (t < 0.45) {
        skyColor = day.clone();
    } else if (t < 0.48) {
        const p = (t - 0.45) / 0.03;
        skyColor = day.clone().lerp(dusk, p);
    } else if (t < 0.54) {
        const p = (t - 0.48) / 0.06;
        skyColor = dusk.clone().lerp(night, p);
    } else if (t < 0.96) {
        skyColor = night.clone();
    } else {
        const p = (t - 0.96) / 0.04;
        skyColor = night.clone().lerp(dusk, p);
    }

    scene.background = skyColor;
    if (scene.fog) scene.fog.color.copy(skyColor);
    ambientLight.intensity = Math.max(0.15, Math.abs(sunHeight) * 0.5 + 0.1 + (sunHeight > 0 ? 0.4 : 0));
}

async function loadSkin(uuid, name) {
    if (skinTextures[uuid]) return;
    var cacheKey = 'skin_' + uuid;
    var cached = localStorage.getItem(cacheKey);
    if (cached) {
        var tex = new THREE.TextureLoader().load(cached, function() {
            if (tex.image) skinDimensions[uuid] = { w: tex.image.width, h: tex.image.height };
        });
        skinTextures[uuid] = tex;
        return;
    }
    try {
        var resp = await fetch('https://sessionserver.mojang.com/session/minecraft/profile/' + uuid);
        if (!resp.ok) { console.log('[FullPlay] Skin API returned ' + resp.status + ' for ' + name); return; }
        var data = await resp.json();
        var prop = data.properties && data.properties.find(function(p) { return p.name === 'textures'; });
        if (!prop) { console.log('[FullPlay] No textures property for ' + name); return; }
        var decoded = JSON.parse(atob(prop.value));
        var skinUrl = decoded.textures && decoded.textures.SKIN && decoded.textures.SKIN.url;
        if (!skinUrl) { console.log('[FullPlay] No skin URL for ' + name); return; }
        var httpsUrl = skinUrl.replace('http://', 'https://');
        var tex = new THREE.TextureLoader().load(httpsUrl, function() {
            if (tex.image) skinDimensions[uuid] = { w: tex.image.width, h: tex.image.height };
        });
        skinTextures[uuid] = tex;
        try { localStorage.setItem(cacheKey, httpsUrl); } catch (e) {}
    } catch (e) {
        console.log('[FullPlay] Skin load failed for ' + name + ': ' + e.message);
    }
}

function loadAllSkins() {
    if (!replayData || !replayData.frames.length) return;
    const seen = {};
    for (const f of replayData.frames.slice(0, Math.min(20, replayData.frames.length))) {
        for (const [uuid, p] of Object.entries(f.players)) {
            if (!seen[uuid] && uuid !== primaryPlayer) {
                seen[uuid] = true;
                loadSkin(uuid, p.name);
            }
        }
    }
    // Load primary player too
    const firstFrame = replayData.frames[0];
    if (firstFrame.players[primaryPlayer]) {
        loadSkin(primaryPlayer, firstFrame.players[primaryPlayer].name);
    }
}

document.getElementById('timeline').addEventListener('input', function() {
    currentFrame = parseInt(this.value);
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
    renderFrame(currentFrame);
    updateTimeline();
});

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

init3D();

var raycaster = new THREE.Raycaster();
var mouse = new THREE.Vector2();
var lastMouseX = 0, lastMouseY = 0;
var hoveredBlock = null;
var blockTooltip = document.getElementById('block-tooltip');

renderer.domElement.addEventListener('mousemove', function(event) {
    var rect = renderer.domElement.getBoundingClientRect();
    lastMouseX = event.clientX;
    lastMouseY = event.clientY;
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
});

renderer.domElement.addEventListener('click', function() {
    if (hoveredBlock) {
        var pos = hoveredBlock.position;
        camera.position.set(pos.x + 5, pos.y + 3, pos.z + 5);
        controls.target.copy(pos);
        controls.update();
        return;
    }
    var huuid = (function() {
        if (!playerMeshes) return null;
        var vec = new THREE.Vector3(), best = null, bestD2 = 900;
        for (var puuid in playerMeshes) {
            vec.copy(playerMeshes[puuid].position);
            vec.project(camera);
            var sx = (vec.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
            var sy = (-vec.y * 0.5 + 0.5) * renderer.domElement.clientHeight;
            var dx = lastMouseX - sx, dy = lastMouseY - sy;
            var d2 = dx * dx + dy * dy;
            if (d2 < bestD2) { bestD2 = d2; best = puuid; }
        }
        return best;
    })();
    if (huuid) { selectedPlayer = huuid; updatePlayersList(); }
});

function updateBlockHover() {
    if (!replayData || blockMeshes.length === 0) {
        blockTooltip.style.display = 'none';
        return;
    }
    raycaster.setFromCamera(mouse, camera);
    var intersects = raycaster.intersectObjects(blockMeshes);
    if (intersects.length > 0 && intersects[0].instanceId !== undefined) {
        var mesh = intersects[0].object;
        var idx = intersects[0].instanceId;
        var dummy = new THREE.Object3D();
        mesh.getMatrixAt(idx, dummy.matrix);
        dummy.matrix.decompose(dummy.position, dummy.quaternion, dummy.scale);
        var bp = dummy.position;
        var colorHex = mesh.material.color.getHex();
        hoveredBlock = { position: bp.clone() };
        blockTooltip.style.display = 'block';
        blockTooltip.innerHTML = 'Block: ' +
            Math.round(bp.x) + ', ' +
            Math.round(bp.y) + ', ' +
            Math.round(bp.z) +
            ' <span style="color:#888">| #' + colorHex.toString(16).padStart(6, '0') + '</span>';
    } else {
        blockTooltip.style.display = 'none';
        hoveredBlock = null;
    }
}

var hashToken = getTokenFromHash();
if (hashToken) {
    document.getElementById('token-field').value = hashToken;
    loadReplay();
}
